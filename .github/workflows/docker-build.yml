name: docker-build

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Validate Compose file
        run: docker compose -f docker/docker-compose.yml config

      - name: Build API image
        run: docker build -f docker/api.Dockerfile -t autopr-api:ci .

      - name: Build worker image
        run: docker build -f docker/worker.Dockerfile -t autopr-worker:ci .
