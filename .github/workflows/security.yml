name: security

on:
  push:
  pull_request:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,llm]" pip-audit

      - name: Run Bandit
        run: bandit -r apps core infra configs observability -x tests

      - name: Audit Python dependencies
        run: pip-audit
