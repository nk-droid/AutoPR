name: integration

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      AUTOPR_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
      AUTOPR_DATABASE_ASYNC_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
      AUTOPR_REDIS_URL: redis://localhost:6379/0
      AUTOPR_TRACE_EXPORTER: none
      AUTOPR_LOG_EXPORTER: console
      AUTOPR_METRICS_EXPORTER: none
      AUTOPR_EXECUTE_REMOTE_ACTIONS: "false"
      GITHUB_WEBHOOK_SECRET: ""
      GITHUB_TOKEN: ""
      SLACK_NOTIFY_NEEDS_REVIEW: "false"
      SLACK_NOTIFY_DLQ: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,llm]"

      - name: Run integration tests
        run: pytest -q -m integration
