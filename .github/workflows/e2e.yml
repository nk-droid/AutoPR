name: e2e

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      AUTOPR_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
      AUTOPR_DATABASE_ASYNC_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
      AUTOPR_REDIS_URL: redis://localhost:6379/0
      AUTOPR_TRACE_EXPORTER: none
      AUTOPR_LOG_EXPORTER: console
      AUTOPR_METRICS_EXPORTER: none
      AUTOPR_EXECUTE_REMOTE_ACTIONS: "false"
      GITHUB_WEBHOOK_SECRET: ""
      GITHUB_TOKEN: ""
      SLACK_NOTIFY_NEEDS_REVIEW: "false"
      SLACK_NOTIFY_DLQ: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,llm]"

      - name: Start local stack
        run: docker compose -f docker/docker-compose.yml up --build -d redis postgres

      - name: Run e2e tests
        run: pytest -q -m e2e

      - name: Show stack logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs --no-color

      - name: Stop local stack
        if: always()
        run: docker compose -f docker/docker-compose.yml down --volumes --remove-orphans
