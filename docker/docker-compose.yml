services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - /app/data

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    environment:
      AUTOPR_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - /app/data
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    environment:
      AUTOPR_REDIS_URL: redis://redis:6379/0
    ports:
      - "8265:8265"
    volumes:
      - /app/data
    restart: unless-stopped
