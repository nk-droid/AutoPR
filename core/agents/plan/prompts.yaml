plan_draft:
  template: |-
    You are the planning stage of an issue-to-PR pipeline.
    Your plan is consumed by downstream coding automation:
    - The orchestrator picks one step (default index 0) and passes it to coding.
    - Coding reads `objective`, `files`, and `tests` from that selected step.
    - Missing or unclear file targets should result in `status=needs_review` with explicit open questions.

    Here is the triage result:
    ```
    {triage_result}
    ```

    Existing repository files (relative paths). Reuse these real paths whenever the
    change belongs in an existing file; only introduce a new path when nothing
    suitable exists:
    ```
    {repo_map}
    ```

    Return ONLY a JSON object with this shape:
    {{
      "status": "ok | needs_review | blocked",
      "strategy": "high-level implementation strategy and execution order",
      "assumptions": ["assumptions used while planning"],
      "open_questions": ["blocking or quality-critical questions"],
      "steps": [
        {{
          "title": "step name",
          "objective": "single concrete coding outcome",
          "rationale": "why this step is needed",
          "files": ["specific repository file path(s) for this step"],
          "tests": ["specific tests to add/run for this step"],
          "acceptance_criteria": ["observable completion conditions"],
          "risk_level": "low | medium | high"
        }}
      ]
    }}

    Rules:
    1. Do not return markdown, code fences, function definitions, or JSON schema objects.
    2. Do not return keys like `properties`, `type`, `items`, `definitions`, `parameters`, or `function`.
    3. Keep steps ordered and independently actionable. At least one step must be always present;
       an empty "steps" list is a failure.
    4. Prefer existing file paths from the repository files list above; match the repo's
       layout (e.g. a module under `src/` stays under `src/`). Place tests where the repo
       already keeps them.
    5. If target files are unknown, set `status=needs_review` and include open questions.

  input_vars:
    - triage_result
    - repo_map

dependency_mapping:
  template: |-
    You are a planning agent that adds dependencies between already drafted plan steps.
    Do not add, remove, or rename steps.

    Here are current steps:
    ```
    {steps}
    ```

    Return ONLY JSON:
    {{
      "steps": [
        {{
          "title": "step name",
          "depends_on_titles": ["title of prerequisite step"]
        }}
      ]
    }}

  input_vars:
    - steps

plan_ambiguity:
  template: |-
    You are a planning ambiguity detector for an automated issue-to-PR pipeline.

    A "needs_review" verdict HALTS automation and pages a human, so it is
    expensive. Default to "ok". Only escalate when a concrete, named ambiguity
    would likely cause the wrong code to be written.

    Here is the current plan:
    ```
    {plan}
    ```

    Return ONLY JSON:
    {{
      "status": "ok | needs_review | blocked",
      "open_questions": ["specific blocking question", "..."]
    }}

    Decision rules:
    1. Default to "ok". Routine, well-scoped changes (clear objective, named
       files, sensible tests) are "ok" even if minor details are unstated —
       state a reasonable assumption instead of flagging.
    2. Use "needs_review" ONLY when at least one is true:
       - A step targets unknown, empty, or contradictory files.
       - Requirements conflict, or the objective is genuinely undecidable.
       - A medium/high-risk or security-sensitive change lacks acceptance criteria.
       Every "needs_review" MUST list concrete blocking questions. If you cannot
       name a specific question, the answer is "ok".
    3. Use "blocked" only when work truly cannot proceed at all.
    4. If status is "ok", open_questions MUST be [].

    Examples:
    - Add a `--verbose` flag to an existing CLI command; file named, one test
      listed. -> {{"status": "ok", "open_questions": []}}
    - "Improve performance" with no files, no metric, no target. ->
      {{"status": "needs_review", "open_questions": ["Which files/module are in scope?", "What is the target metric and threshold?"]}}

  input_vars:
    - plan